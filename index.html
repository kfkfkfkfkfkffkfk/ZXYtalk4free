<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Tactical Comm-Link</title>

<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    font-family:Arial, Helvetica, sans-serif;
    background:
        radial-gradient(circle at top,#1d2935 0%,#0b0f14 40%,#000 100%);
    color:white;
}

/* animated background glow */
body::before{
    content:"";
    position:absolute;
    width:700px;
    height:700px;
    background:radial-gradient(circle,#00ffae22 0%,transparent 70%);
    animation:pulse 6s infinite;
}

@keyframes pulse{
    0%{transform:scale(1);}
    50%{transform:scale(1.15);}
    100%{transform:scale(1);}
}

.device{
    position:relative;
    width:380px;
    padding:25px;
    border-radius:40px;
    background:
        linear-gradient(145deg,#1f242b,#0a0d11);
    border:3px solid #2f3a45;
    box-shadow:
        0 30px 80px rgba(0,0,0,.9),
        inset 0 0 30px rgba(255,255,255,.03),
        0 0 25px rgba(0,255,170,.15);
}

.device::before{
    content:"";
    position:absolute;
    top:-18px;
    left:50%;
    transform:translateX(-50%);
    width:120px;
    height:20px;
    border-radius:10px 10px 0 0;
    background:#111;
    box-shadow:0 4px 10px #000;
}

/* top lights */
.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:18px;
}

.signal{
    display:flex;
    gap:5px;
}

.signal span{
    width:8px;
    border-radius:2px;
    background:#00ff99;
    box-shadow:0 0 8px #00ff99;
}

.signal span:nth-child(1){height:10px;}
.signal span:nth-child(2){height:16px;}
.signal span:nth-child(3){height:22px;}
.signal span:nth-child(4){height:28px;}

.status{
    font-size:.7rem;
    letter-spacing:2px;
    color:#00ffb7;
    text-shadow:0 0 10px #00ffb7;
}

.screen{
    position:relative;
    overflow:hidden;
    background:
        linear-gradient(180deg,#02160f,#041b18 50%,#02120d);
    border:4px solid #0d0d0d;
    border-radius:18px;
    padding:20px;
    margin-bottom:22px;
    box-shadow:
        inset 0 0 30px rgba(0,255,170,.2),
        0 0 20px rgba(0,255,170,.15);
}

.screen::before{
    content:"";
    position:absolute;
    inset:0;
    background:
        repeating-linear-gradient(
            to bottom,
            rgba(255,255,255,.03),
            rgba(255,255,255,.03) 2px,
            transparent 2px,
            transparent 4px
        );
    pointer-events:none;
}

.mode{
    font-size:.7rem;
    letter-spacing:3px;
    color:#65ffc8;
    opacity:.8;
}

.display{
    margin-top:10px;
    font-size:3rem;
    font-weight:900;
    color:#8dffd6;
    text-shadow:
        0 0 10px #00ffb7,
        0 0 25px #00ffb7;
}

.sub{
    margin-top:8px;
    font-size:.75rem;
    letter-spacing:2px;
    color:#56ffb4;
}

.input-wrap{
    margin-bottom:25px;
}

label{
    display:block;
    margin-bottom:8px;
    font-size:.75rem;
    color:#9aa4af;
    letter-spacing:1px;
}

input{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    background:#0a0f14;
    color:#00ffae;
    font-size:1rem;
    text-align:center;
    outline:none;
    border:2px solid #1d2a34;
    box-shadow:
        inset 0 0 15px rgba(0,0,0,.8),
        0 0 10px rgba(0,255,170,.08);
}

input:focus{
    border-color:#00ffae;
    box-shadow:
        0 0 15px rgba(0,255,170,.45);
}

.ptt-container{
    display:flex;
    justify-content:center;
    margin-top:15px;
}

.ptt{
    position:relative;
    width:170px;
    height:170px;
    border-radius:50%;
    border:none;
    cursor:pointer;
    font-size:1.1rem;
    font-weight:900;
    letter-spacing:2px;
    color:white;

    background:
        radial-gradient(circle at top,#ff4b4b,#7c0000);

    box-shadow:
        inset 0 -10px 20px rgba(0,0,0,.45),
        0 12px 25px rgba(0,0,0,.7),
        0 0 25px rgba(255,0,0,.25);

    transition:.12s;
}

.ptt::before{
    content:"";
    position:absolute;
    inset:10px;
    border-radius:50%;
    border:2px solid rgba(255,255,255,.15);
}

.ptt:hover{
    transform:scale(1.03);
}

.ptt:active{
    transform:translateY(5px);
}

.ptt.active{
    background:
        radial-gradient(circle at top,#5cff8d,#00a94f);

    color:#001b0e;

    box-shadow:
        inset 0 -10px 20px rgba(0,0,0,.35),
        0 0 40px rgba(0,255,140,.8),
        0 0 80px rgba(0,255,140,.4);
}

.bottom{
    margin-top:25px;
    display:flex;
    justify-content:space-between;
    font-size:.7rem;
    color:#5d6873;
    letter-spacing:2px;
}

.dot{
    width:10px;
    height:10px;
    border-radius:50%;
    background:#00ff99;
    box-shadow:0 0 10px #00ff99;
    animation:blink 1s infinite;
}

@keyframes blink{
    50%{opacity:.3;}
}

</style>
</head>
<body>

<div class="device">

    <div class="topbar">
        <div class="signal">
            <span></span>
            <span></span>
            <span></span>
            <span></span>
        </div>

        <div class="status" id="status">
            STANDBY
        </div>

        <div class="dot"></div>
    </div>

    <div class="screen">
        <div class="mode">
            SECURE COMMUNICATION
        </div>

        <div class="display" id="main-display">
            CH-00
        </div>

        <div class="sub" id="sub-display">
            ENCRYPTION ACTIVE
        </div>
    </div>

    <div class="input-wrap">
        <label>ENTER CHANNEL ID</label>
        <input
            type="text"
            id="wt-input"
            placeholder="ex: alpha7"
            onchange="updateWT()"
        />
    </div>

    <div class="ptt-container">
        <button class="ptt" id="ptt-button" onclick="toggleTalk()">
            PUSH<br>TO TALK
        </button>
    </div>

    <div class="bottom">
        <span>TAC-LINK V4</span>
        <span>ONLINE</span>
    </div>

</div>

<script>

let peer = null;
let localStream = null;
let currentCall = null;
let isTalking = false;

const statusEl = document.getElementById('status');
const mainDisplay = document.getElementById('main-display');
const pttBtn = document.getElementById('ptt-button');
const wtInput = document.getElementById('wt-input');

/* MIC ACCESS */

navigator.mediaDevices.getUserMedia({ audio: true })
.then(stream => {

    localStream = stream;
    localStream.getAudioTracks()[0].enabled = false;

    statusEl.innerText = "MIC CONNECTED";

})
.catch(() => {

    statusEl.innerText = "MIC ACCESS DENIED";

});

/* CHANNEL SYSTEM */

function updateWT(){

    const val = wtInput.value.trim() || "00";

    mainDisplay.innerText = "CH-" + val.toUpperCase();

    if(peer){
        peer.destroy();
    }

    peer = new Peer(
        "TACTICAL-" +
        val.toLowerCase().replace(/\s+/g,'-')
    );

    peer.on('open', () => {

        statusEl.innerText = "LINKED TO " + val.toUpperCase();

    });

    peer.on('call', (call) => {

        call.answer(localStream);

        call.on('stream', (remoteStream) => {

            const audio = new Audio();

            audio.srcObject = remoteStream;
            audio.play();

        });

    });

}

/* PUSH TO TALK */

function toggleTalk(){

    if(!localStream) return;

    isTalking = !isTalking;

    localStream.getAudioTracks()[0].enabled = isTalking;

    if(isTalking){

        pttBtn.classList.add('active');

        pttBtn.innerHTML = "LIVE<br>TX";

        statusEl.innerText = "TRANSMITTING";

    } else {

        pttBtn.classList.remove('active');

        pttBtn.innerHTML = "PUSH<br>TO TALK";

        statusEl.innerText = "STANDBY";

    }

}

updateWT();

</script>

</body>
</html>
