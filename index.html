<!-- ========= ADD THIS INSIDE .right-panel ========= -->

<div class="panel">

    <div class="panel-title">
        FACETIME LINK
    </div>

    <div style="display:flex;flex-direction:column;gap:14px;">

        <video
            id="remoteVideo"
            autoplay
            playsinline
            style="

                border-radius:18px;
                background:black;
                border:2px solid rgba(0,255,170,.15);
                display:none;
            "
        ></video>

        <video
            id="localVideo"
            autoplay
            muted
            playsinline
            style="
                width:140px;
                position:absolute;
                right:60px;
                bottom:150px;
                border-radius:18px;
                border:2px solid rgba(0,255,170,.2);
                background:black;
                display:none;
                z-index:20;
            "
        ></video>

        <button id="videoBtn" style="
            padding:16px;
            border:none;
            border-radius:18px;

        ">
            START FACETIME
        </button>

        <button id="blackoutBtn" style="
            padding:16px;
            border:none;
            border-radius:18px;
            background:#120202;
            color:#ff9e9e;
            font-weight:800;
            letter-spacing:2px;
            cursor:pointer;
            border:1px solid rgba(255,0,0,.2);
        ">
            SCREEN BLACKOUT: OFF
        </button>

    </div>

</div>

<!-- ========= ADD THIS BEFORE </body> ========= -->

<div id="blackoutScreen" style="
    position:fixed;
    inset:0;
    background:black;
    z-index:99999;
    display:none;
"></div>

<script>

/* =========================
   FACETIME SYSTEM
========================= */

let videoEnabled = false;
let blackoutEnabled = false;

const remoteVideo =
    document.getElementById("remoteVideo");

const localVideo =
    document.getElementById("localVideo");

const videoBtn =
    document.getElementById("videoBtn");

const blackoutBtn =
    document.getElementById("blackoutBtn");

const blackoutScreen =
    document.getElementById("blackoutScreen");

/* REPLACE YOUR getUserMedia SECTION WITH THIS */

navigator.mediaDevices.getUserMedia({
    audio:true,
    video:true
})

.then(stream=>{

    localStream = stream;

    /* DEFAULTS */

    localStream.getAudioTracks()[0].enabled = false;

    localStream.getVideoTracks()[0].enabled = false;

    localVideo.srcObject = localStream;

    statusEl.innerText = "A/V READY";

})

.catch(()=>{

    statusEl.innerText = "DEVICE ACCESS DENIED";

});

/* VIDEO TOGGLE */

videoBtn.addEventListener("click", ()=>{

    if(!localStream) return;

    videoEnabled = !videoEnabled;

    localStream.getVideoTracks()[0].enabled =
        videoEnabled;

    if(videoEnabled){

        videoBtn.innerText = "STOP FACETIME";

        localVideo.style.display = "block";

        remoteVideo.style.display = "block";

        statusEl.innerText = "VIDEO ACTIVE";

        startVideoCall();

    } else {

        videoBtn.innerText = "START FACETIME";

        localVideo.style.display = "none";

        remoteVideo.style.display = "none";

        statusEl.innerText = "VIDEO OFF";

    }

});

/* BLACKOUT BUTTON */

blackoutBtn.addEventListener("click", ()=>{

    blackoutEnabled = !blackoutEnabled;

    if(blackoutEnabled){

        blackoutScreen.style.display = "block";

        blackoutBtn.innerText =
            "SCREEN BLACKOUT: ON";

    } else {

        blackoutScreen.style.display = "none";

        blackoutBtn.innerText =
            "SCREEN BLACKOUT: OFF";

    }

});

/* VIDEO CALL OVER CHANNEL */

function startVideoCall(){

    if(!peer || !localStream) return;

    const channel =
        "OMEGA-" +
        input.value.replace(".","-");

    const call =
        peer.call(channel, localStream);

    if(call){

        call.on("stream",(remoteStream)=>{

            remoteVideo.srcObject = remoteStream;

        });

    }

}

/* MODIFY YOUR EXISTING peer.on("call") */

peer.on("call",(call)=>{

    call.answer(localStream);

    call.on("stream",(remoteStream)=>{

        /* AUDIO */

        const audio = new Audio();

        audio.srcObject = remoteStream;

        audio.play();

        /* VIDEO */

        remoteVideo.srcObject = remoteStream;

        remoteVideo.style.display = "block";

    });

});

</script>
