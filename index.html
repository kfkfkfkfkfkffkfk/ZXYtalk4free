<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro-Spec Walkie & FM Radio</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: 'Courier New', Courier, monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: #1a1a1a; color: #00ff00; margin: 0; }
        .device { border: 4px solid #444; padding: 20px; border-radius: 30px; background: #2c2c2c; box-shadow: 0 0 30px #000; text-align: center; width: 320px; border-bottom: 15px solid #222; }
        #status { font-size: 0.7rem; margin-bottom: 10px; color: #ffcc00; height: 15px; text-transform: uppercase; }
        .screen { background: #003300; padding: 15px; border-radius: 10px; margin-bottom: 20px; border: 3px inset #111; color: #0f0; }
        .display-label { font-size: 0.6rem; display: block; text-align: left; opacity: 0.7; }
        .freq-display { font-size: 1.6rem; font-weight: bold; margin: 5px 0; min-height: 40px; display: flex; align-items: center; justify-content: center;}
        
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        label { font-size: 0.65rem; color: #aaa; display: block; margin-bottom: 4px; }
        
        /* Dropdown Styling */
        select { background: #000; color: #0f0; border: 1px solid #333; padding: 8px; width: 100%; text-align: center; font-size: 0.9rem; border-radius: 4px; cursor: pointer; outline: none; }
        
        /* Toggle Button Styling */
        .ptt-btn { width: 110px; height: 110px; border-radius: 50%; border: 5px solid #600; background: radial-gradient(#c00, #800); color: white; font-weight: bold; cursor: pointer; box-shadow: 0 6px #400; margin: 10px; transition: 0.2s; font-size: 0.8rem; }
        .ptt-btn.active { background: radial-gradient(#0f0, #080); border-color: #040; box-shadow: 0 0 15px #0f0; color: #000; transform: translateY(2px); }
        
        .mode-btn { width: 100%; padding: 10px; background: #444; border: 1px solid #555; color: white; cursor: pointer; font-size: 0.8rem; text-transform: uppercase; border-radius: 5px; }
        .active-mode { background: #008800 !important; color: white !important; box-shadow: inset 0 0 10px #0f0; }
    </style>
</head>
<body>

    <div class="device">
        <div id="status">INITIALIZING...</div>
        
        <div class="screen">
            <span class="display-label" id="mode-name">WALKIE MODE</span>
            <div class="freq-display" id="main-display">CH-01</div>
            <span class="display-label" id="sub-display">READY TO SCAN</span>
        </div>

        <div class="controls">
            <div>
                <label>WT CHANNEL</label>
                <select id="wt-selector" onchange="updateWT()">
                    </select>
            </div>
            <div>
                <label>RADIO TOWER</label>
                <select id="fm-selector" onchange="updateFM()">
                    <option value="90.1">90.1 Synth</option>
                    <option value="94.5">94.5 Classics</option>
                    <option value="102.7">102.7 Lo-Fi</option>
                    <option value="107.9">107.9 Jazz</option>
                </select>
            </div>
        </div>

        <button class="ptt-btn" id="ptt-button" onclick="toggleTalk()">MIC OFF</button>

        <div style="display: flex; gap: 5px;">
            <button id="btn-wt" class="mode-btn active-mode" onclick="setMode('WT')">Walkie</button>
            <button id="btn-fm" class="mode-btn" onclick="setMode('FM')">Radio</button>
        </div>
    </div>

    <audio id="radio-player" preload="none" loop></audio>

    <script>
        let peer = null;
        let localStream = null;
        let currentMode = 'WT';
        let isTalking = false;

        // Map different numbers to different streams
        const stations = {
            "90.1": "https://stream.nightride.fm/nightride.mp3",
            "94.5": "http://icecast.walmradio.com:8000/classic",
            "102.7": "https://stream.syntheticfm.com/1",
            "107.9": "https://icecast.walmradio.com:8000/jazz"
        };

        const radioPlayer = document.getElementById('radio-player');
        const mainDisplay = document.getElementById('main-display');
        const pttBtn = document.getElementById('ptt-button');
        const wtSelect = document.getElementById('wt-selector');

        // Populate 99 Walkie Channels
        for(let i=1; i<=99; i++) {
            let opt = document.createElement('option');
            opt.value = i;
            opt.innerHTML = "CH-" + i.toString().padStart(2, '0');
            wtSelect.appendChild(opt);
        }

        // Initialize Audio
        navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
            localStream = stream;
            localStream.getAudioTracks()[0].enabled = false;
            updateWT(); 
        }).catch(() => { document.getElementById('status').innerText = "ERROR: MIC DENIED"; });

        function setMode(mode) {
            currentMode = mode;
            document.getElementById('btn-wt').classList.toggle('active-mode', mode === 'WT');
            document.getElementById('btn-fm').classList.toggle('active-mode', mode === 'FM');
            
            if (mode === 'FM') {
                if(isTalking) toggleTalk(); // Turn off mic if switching to radio
                updateFM();
            } else {
                radioPlayer.pause();
                updateWT();
            }
        }

        function updateWT() {
            const ch = wtSelect.value.padStart(2, '0');
            if(currentMode === 'WT') {
                mainDisplay.innerText = "CH-" + ch;
                document.getElementById('mode-name').innerText = "WALKIE MODE";
            }
            if (peer) peer.destroy();
            peer = new Peer("G-WT-CH-" + ch + "-" + Math.floor(Math.random() * 100));
            peer.on('open', () => { document.getElementById('status').innerText = "ONLINE: CH " + ch; });
            peer.on('call', (call) => {
                call.answer(localStream);
                call.on('stream', (remoteStream) => {
                    const audio = new Audio();
                    audio.srcObject = remoteStream;
                    audio.play();
                });
            });
        }

        function updateFM() {
            const freq = document.getElementById('fm-selector').value;
            if(currentMode === 'FM') {
                mainDisplay.innerText = freq + " MHz";
                document.getElementById('mode-name').innerText = "RADIO TOWER";
                radioPlayer.src = stations[freq];
                radioPlayer.play();
            }
        }

        function toggleTalk() {
            if (!localStream) return;
            
            isTalking = !isTalking;
            localStream.getAudioTracks()[0].enabled = isTalking;

            if (isTalking) {
                pttBtn.classList.add('active');
                pttBtn.innerText = "MIC ON";
                document.getElementById('status').innerText = "TRANSMITTING...";
                if (currentMode === 'FM') radioPlayer.volume = 0.2; // Dim radio if talking
            } else {
                pttBtn.classList.remove('active');
                pttBtn.innerText = "MIC OFF";
                document.getElementById('status').innerText = "STANDBY";
                radioPlayer.volume = 1.0;
            }
        }
    </script>
</body>
</html>
