<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEURAL-LINK | Tactical Comms</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=JetBrains+Mono:wght@300&display=swap" rel="stylesheet">
    <style>
        :root {
            --glow-cyan: #00f2ff;
            --glow-green: #00ff9d;
            --dark-bg: #030508;
            --panel-border: rgba(0, 242, 255, 0.3);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0;
            padding: 0;
            background: var(--dark-bg);
            color: white;
            font-family: 'Orbitron', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Background Grid */
        .bg-overlay {
            position: fixed;
            inset: 0;
            background: 
                linear-gradient(rgba(0, 242, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 242, 255, 0.05) 1px, transparent 1px);
            background-size: 30px 30px;
            z-index: -1;
        }

        /* Main Responsive Container */
        .comm-deck {
            width: 90vw;
            max-width: 450px;
            height: 90vh;
            max-height: 800px;
            background: rgba(10, 15, 20, 0.9);
            border: 2px solid var(--panel-border);
            border-radius: 30px;
            display: flex;
            flex-direction: column;
            padding: 25px;
            box-shadow: 0 0 50px rgba(0,0,0,1), inset 0 0 20px rgba(0, 242, 255, 0.1);
            position: relative;
        }

        /* Header / Scanline */
        .deck-header {
            font-size: 0.7rem;
            letter-spacing: 4px;
            color: var(--glow-cyan);
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid var(--panel-border);
            padding-bottom: 10px;
        }

        /* The Virtual Screen */
        .screen-module {
            background: #000;
            flex-grow: 1;
            border-radius: 15px;
            border: 1px solid #1a252b;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            position: relative;
            overflow: hidden;
        }

        /* Animated Signal Lines */
        .signal-wave {
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }

        .bar {
            width: 3px;
            height: 10px;
            background: var(--glow-cyan);
            animation: bounce 1s infinite ease-in-out;
        }

        .freq-readout {
            font-size: clamp(2rem, 8vw, 3.5rem);
            font-weight: 700;
            text-align: center;
            color: #fff;
            text-shadow: 0 0 20px var(--glow-cyan);
        }

        /* Controls */
        .control-panel {
            margin-top: 25px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .input-wrapper {
            display: flex;
            background: rgba(255,255,255,0.05);
            padding: 5px;
            border-radius: 12px;
            border: 1px solid #333;
        }

        input[type="number"] {
            flex-grow: 1;
            background: transparent;
            border: none;
            color: var(--glow-cyan);
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.2rem;
            padding: 10px;
            outline: none;
            text-align: center;
        }

        .set-btn {
            background: var(--glow-cyan);
            color: #000;
            border: none;
            padding: 0 20px;
            border-radius: 8px;
            font-family: 'Orbitron';
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        /* TAP TOGGLE BUTTON */
        .ptt-circle {
            width: min(150px, 35vw);
            height: min(150px, 35vw);
            margin: 20px auto;
            border-radius: 50%;
            border: 4px solid #1a1e23;
            background: radial-gradient(circle, #1a1e23 0%, #000 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        .ptt-circle.active {
            border-color: var(--glow-green);
            box-shadow: 0 0 30px rgba(0, 255, 157, 0.4);
            transform: scale(1.1);
        }

        .mic-svg {
            width: 40px;
            fill: #333;
            transition: 0.3s;
        }

        .active .mic-svg { fill: var(--glow-green); filter: drop-shadow(0 0 10px var(--glow-green)); }

        .btn-label {
            font-size: 0.6rem;
            color: #555;
            margin-top: 8px;
            letter-spacing: 1px;
        }

        .active .btn-label { color: var(--glow-green); }

        /* Animations */
        @keyframes bounce {
            0%, 100% { height: 5px; opacity: 0.3; }
            50% { height: 30px; opacity: 1; }
        }

        /* Device Specific Tweaks */
        @media (min-width: 768px) {
            .comm-deck { width: 400px; height: 700px; }
        }

        @media (max-height: 600px) {
            .comm-deck { height: 95vh; padding: 15px; }
            .freq-readout { font-size: 2rem; }
        }
    </style>
</head>
<body>

<div class="bg-overlay"></div>

<div class="comm-deck">
    <div class="deck-header">
        <span>ID: <span id="peer-id-suffix">----</span></span>
        <span>ENCRYPTED_LINK</span>
    </div>

    <div class="screen-module">
        <div id="status-tag" style="font-size: 0.6rem; color: var(--glow-cyan);">[ STANDBY ]</div>
        
        <div class="signal-wave" id="wave-container">
            </div>

        <div class="freq-readout" id="freq-display">00.000</div>
        
        <div style="font-family: 'JetBrains Mono'; font-size: 0.55rem; color: #444; text-align: center;">
            BANDWIDTH: 12.4kbps // SIGNAL: STABLE
        </div>
    </div>

    <div class="control-panel">
        <div class="input-wrapper">
            <input type="number" id="freq-input" step="0.001" placeholder="91.898" min="1" max="100">
            <button class="set-btn" onclick="initializeComms()">LINK</button>
        </div>

        <div class="ptt-circle" id="ptt-toggle">
            <svg class="mic-svg" viewBox="0 0 24 24">
                <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
                <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
            </svg>
            <span class="btn-label" id="btn-text">OPEN LINK</span>
        </div>
    </div>
</div>

<script>
    let peer = null;
    let localStream = null;
    let isLive = false;

    // Create animated background bars
    const waveContainer = document.getElementById('wave-container');
    for(let i=0; i<15; i++) {
        const bar = document.createElement('div');
        bar.className = 'bar';
        bar.style.animationDelay = `${i * 0.1}s`;
        waveContainer.appendChild(bar);
    }

    // Initialize Microphone
    navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
        localStream = stream;
        localStream.getAudioTracks()[0].enabled = false;
        document.getElementById('status-tag').innerText = "[ HARDWARE READY ]";
    }).catch(() => {
        document.getElementById('status-tag').innerText = "[ MIC ERROR ]";
    });

    function initializeComms() {
        const val = parseFloat(document.getElementById('freq-input').value);
        if (isNaN(val) || val < 1 || val > 100) return alert("Range: 1.000 - 100.000");

        const frequency = val.toFixed(3);
        document.getElementById('freq-display').innerText = frequency;
        document.getElementById('peer-id-suffix').innerText = frequency;

        if (peer) peer.destroy();

        // Create the connection point
        peer = new Peer(`cyber-link-${frequency}`);

        peer.on('open', () => {
            document.getElementById('status-tag').innerText = "[ CHANNEL TUNED ]";
        });

        peer.on('call', (call) => {
            call.answer(localStream);
            handleAudio(call);
        });

        peer.on('error', (err) => {
            if(err.type === 'unavailable-id') {
                const call = peer.call(`cyber-link-${frequency}`, localStream);
                if(call) handleAudio(call);
            }
        });
    }

    function handleAudio(call) {
        call.on('stream', (remoteStream) => {
            const audio = new Audio();
            audio.srcObject = remoteStream;
            audio.play();
            document.getElementById('status-tag').innerText = "[ DATA RECEIVING ]";
        });
    }

    // Tap to Talk Logic
    const pttBtn = document.getElementById('ptt-toggle');
    pttBtn.addEventListener('click', () => {
        if (!localStream) return;

        isLive = !isLive;
        localStream.getAudioTracks()[0].enabled = isLive;

        if (isLive) {
            pttBtn.classList.add('active');
            document.getElementById('btn-text').innerText = "LIVE TRANSMIT";
            document.getElementById('status-tag').innerText = "[ UPLOADING SIGNAL ]";
            document.getElementById('status-tag').style.color = "var(--glow-green)";
        } else {
            pttBtn.classList.remove('active');
            document.getElementById('btn-text').innerText = "OPEN LINK";
            document.getElementById('status-tag').innerText = "[ CHANNEL TUNED ]";
            document.getElementById('status-tag').style.color = "var(--glow-cyan)";
        }
    });
</script>
</body>
</html>
