<style>

/* ================= VIDEO FACETIME ================= */

.video-layer{
    position:fixed;
    inset:0;
    z-index:200;
    pointer-events:none;
}

.video-container{
    position:absolute;
    top:30px;
    right:30px;

    width:340px;
    height:220px;

    border-radius:28px;
    overflow:hidden;

    background:#000;

    border:2px solid rgba(0,255,180,.2);

    box-shadow:
        0 0 40px rgba(0,255,180,.18),
        inset 0 0 20px rgba(255,255,255,.05);

    backdrop-filter:blur(20px);

    transition:.25s;
}

.video-container.fullscreen{
    width:calc(100vw - 60px);
    height:calc(100vh - 60px);
}

.video-feed{
    position:absolute;
    inset:0;

    width:100%;
    height:100%;

    object-fit:cover;
    background:#000;
}

.remote-video{
    z-index:1;
}

.local-video{
    z-index:2;

    width:120px;
    height:160px;

    right:18px;
    bottom:18px;
    left:auto;
    top:auto;

    border-radius:18px;

    border:2px solid rgba(255,255,255,.15);

    box-shadow:0 0 20px rgba(0,0,0,.5);
}

/* VIDEO CONTROLS */

.video-controls{
    display:flex;
    gap:12px;
    margin-top:15px;
    flex-wrap:wrap;
}

.video-btn{

    flex:1;

    border:none;
    cursor:pointer;

    padding:18px;

    border-radius:18px;

    font-weight:800;
    letter-spacing:2px;

    background:rgba(0,255,180,.08);

    color:#8cffda;

    border:1px solid rgba(0,255,180,.15);

    transition:.2s;
}

.video-btn:hover{
    transform:translateY(-2px);

    background:rgba(0,255,180,.16);
}

.video-btn.active{
    background:#00ff9d;
    color:black;

    box-shadow:
        0 0 30px rgba(0,255,150,.5);
}

/* SCREEN BLOCKER */

.screen-block{

    position:fixed;
    inset:0;

    background:black;

    z-index:500;

    display:none;

    justify-content:center;
    align-items:center;

    flex-direction:column;
}

.screen-block.active{
    display:flex;
}

.block-text{
    color:#00ffb7;

    font-size:4rem;
    font-weight:900;

    letter-spacing:8px;

    text-shadow:
        0 0 20px #00ffb7;
}

.unlock{
    margin-top:30px;

    padding:18px 30px;

    border:none;

    border-radius:18px;

    background:#00ffb7;

    color:black;

    font-weight:900;

    cursor:pointer;
}

</style>

<!-- VIDEO UI -->

<div class="video-layer">

    <div class="video-container" id="videoContainer">

        <video
            id="remoteVideo"
            class="video-feed remote-video"
            autoplay
            playsinline
        ></video>

        <video
            id="localVideo"
            class="video-feed local-video"
            autoplay
            muted
            playsinline
        ></video>

    </div>

</div>

<!-- SCREEN BLOCK -->

<div class="screen-block" id="screenBlock">

    <div class="block-text">
        SCREEN LOCKED
    </div>

    <button class="unlock" id="unlockBtn">
        UNLOCK
    </button>

</div>
