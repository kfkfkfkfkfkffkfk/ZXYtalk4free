<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Walkie-Talkie & Radio</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: 'Courier New', Courier, monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: #1a1a1a; color: #00ff00; margin: 0; }
        .device { border: 4px solid #333; padding: 20px; border-radius: 20px; background: #2c2c2c; box-shadow: 0 0 20px #000; text-align: center; width: 300px; }
        #status { font-size: 0.8rem; margin-bottom: 10px; color: #ffcc00; }
        .screen { background: #004400; padding: 10px; border-radius: 5px; margin-bottom: 20px; border: 2px inset #222; }
        input { background: #000; color: #0f0; border: 1px solid #0f0; padding: 5px; width: 80%; margin: 5px; text-align: center; }
        .ptt-btn { width: 120px; height: 120px; border-radius: 50%; border: 4px solid #800; background: #c00; color: white; font-weight: bold; cursor: pointer; box-shadow: 0 6px #600; margin: 15px; }
        .ptt-btn:active { box-shadow: 0 2px #600; transform: translateY(4px); background: #f00; }
        .mode-toggle { font-size: 0.7rem; margin-top: 10px; cursor: pointer; background: #444; border: none; color: white; padding: 5px; }
        .active-mode { background: #00ff00 !important; color: black !important; }
    </style>
</head>
<body>

    <div class="device">
        <div id="status">OFFLINE</div>
        <div class="screen">
            CH: <input type="text" id="channel-input" placeholder="Enter Channel Name" value="Public-1">
            <button onclick="joinChannel()">SET CHANNEL</button>
        </div>

        <button class="ptt-btn" id="ptt-button">PUSH TO TALK</button>

        <div style="margin-top: 10px;">
            <button id="radio-toggle" class="mode-toggle" onclick="toggleRadio()">RADIO MODE: OFF</button>
        </div>
    </div>

    <audio id="radio-player" src="https://stream.nightride.fm/nightride.mp3" preload="none"></audio>

    <script>
        let peer = null;
        let localStream = null;
        let radioActive = false;
        const radioPlayer = document.getElementById('radio-player');

        // Setup Audio
        navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
            localStream = stream;
            localStream.getAudioTracks()[0].enabled = false;
        });

        function joinChannel() {
            const channel = document.getElementById('channel-input').value;
            if (!channel) return alert("Enter a channel name!");

            if (peer) peer.destroy();

            // We use a prefix so people don't accidentally connect to random PeerJS users
            // Note: In a real app, you'd use a backend to list users. 
            // Here, you must share your specific ID with friends to "Call" them into the channel.
            peer = new Peer("WT-" + channel + "-" + Math.floor(Math.random() * 1000));

            peer.on('open', (id) => {
                document.getElementById('status').innerText = "ONLINE: " + id;
            });

            peer.on('call', (call) => {
                call.answer(localStream);
                call.on('stream', (remoteStream) => {
                    const audio = new Audio();
                    audio.srcObject = remoteStream;
                    audio.play();
                });
            });
        }

        // Radio Logic
        function toggleRadio() {
            radioActive = !radioActive;
            const btn = document.getElementById('radio-toggle');
            if (radioActive) {
                radioPlayer.play();
                btn.innerText = "RADIO MODE: ON";
                btn.classList.add('active-mode');
            } else {
                radioPlayer.pause();
                btn.innerText = "RADIO MODE: OFF";
                btn.classList.remove('active-mode');
            }
        }

        // PTT Logic
        const pttBtn = document.getElementById('ptt-button');
        
        const startTalking = () => {
            if (localStream) {
                localStream.getAudioTracks()[0].enabled = true;
                if (radioActive) radioPlayer.volume = 0.1; // Duck radio volume while talking
            }
        };

        const stopTalking = () => {
            if (localStream) {
                localStream.getAudioTracks()[0].enabled = false;
                if (radioActive) radioPlayer.volume = 1.0;
            }
        };

        pttBtn.addEventListener('mousedown', startTalking);
        pttBtn.addEventListener('mouseup', stopTalking);
        pttBtn.addEventListener('touchstart', (e) => { e.preventDefault(); startTalking(); });
        pttBtn.addEventListener('touchend', stopTalking);

    </script>
</body>
</html>
